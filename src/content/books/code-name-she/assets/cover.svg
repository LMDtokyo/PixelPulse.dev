<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="68%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0e151c"/>
      <stop offset="55%" stop-color="#080c11"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd6c9" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#1b6f73" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfbf9"/>
      <stop offset="100%" stop-color="#c5ccd2"/>
    </linearGradient>
    <pattern id="rain" width="26" height="48" patternUnits="userSpaceOnUse" patternTransform="rotate(16)">
      <line x1="2" y1="0" x2="2" y2="30" stroke="#a9c2d4" stroke-width="1" stroke-opacity="0.10"/>
      <line x1="15" y1="10" x2="15" y2="44" stroke="#a9c2d4" stroke-width="1" stroke-opacity="0.06"/>
    </pattern>
    <clipPath id="frame"><rect width="1200" height="630" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#rain)"/>

    <!-- glow behind the eye -->
    <ellipse cx="905" cy="300" rx="320" ry="300" fill="url(#glow)"/>

    <!-- the eye — «Она» watching -->
    <g transform="translate(905 300)">
      <path d="M-190 0 Q0 -118 190 0 Q0 118 -190 0 Z" fill="#0a1014" stroke="#2b3b44" stroke-width="2"/>
      <!-- iris glitch aberration -->
      <circle cx="-3" cy="0" r="74" fill="#e11d1d" opacity="0.35"/>
      <circle cx="4"  cy="0" r="74" fill="#56e1ff" opacity="0.30"/>
      <circle cx="0"  cy="0" r="72" fill="#0c171b"/>
      <circle cx="0"  cy="0" r="72" fill="none" stroke="#4fd6c9" stroke-width="3"/>
      <circle cx="0" cy="0" r="64" fill="none" stroke="#1d5b5f" stroke-width="10" opacity="0.5"/>
      <circle cx="0" cy="0" r="30" fill="#04090b"/>
      <circle cx="-14" cy="-16" r="9" fill="#dff7f4" opacity="0.9"/>
      <circle cx="16" cy="10" r="3" fill="#9fe9e2" opacity="0.7"/>
      <!-- glitch scan slivers across the eye -->
      <rect x="-190" y="-26" width="380" height="4" fill="#56e1ff" opacity="0.16"/>
      <rect x="-190" y="34" width="380" height="3" fill="#e11d1d" opacity="0.14"/>
    </g>

    <!-- faint horizontal datamosh bands -->
    <rect x="0" y="150" width="1200" height="2" fill="#56e1ff" opacity="0.05"/>
    <rect x="0" y="470" width="1200" height="2" fill="#e11d1d" opacity="0.05"/>

    <!-- title block -->
    <g font-family="Georgia, 'Times New Roman', serif">
      <text x="84" y="232" font-family="'JetBrains Mono', monospace" font-size="30"
            letter-spacing="14" fill="#aeb8c0">КОД ИМЕНИ</text>

      <!-- chromatic aberration on «Она» -->
      <text x="76" y="372" font-size="190" font-weight="700" fill="#e11d1d" opacity="0.30">Она</text>
      <text x="84" y="372" font-size="190" font-weight="700" fill="#56e1ff" opacity="0.25">Она</text>
      <text x="80" y="372" font-size="190" font-weight="700" fill="url(#title)">Она</text>

      <rect x="86" y="398" width="190" height="3" fill="#e11d1d"/>
      <text x="88" y="446" font-size="27" font-style="italic" fill="#8fa0ad">«ты знаешь, кто я.»</text>
    </g>

    <!-- vignette -->
    <rect width="1200" height="630" fill="url(#bg)" opacity="0" />
    <rect width="1200" height="630" fill="none" stroke="#000" stroke-width="40" opacity="0.35"/>
  </g>
</svg>
