<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 220" font-family="'JetBrains Mono', monospace">
  <rect width="940" height="220" rx="14" fill="#0d0d0d" stroke="#262626"/>
  <text x="28" y="40" fill="#8a8a8a" font-size="13" letter-spacing="3">RE PIPELINE</text>

  <!-- stages -->
  <g>
    <!-- 1 -->
    <rect x="28"  y="74" width="150" height="80" rx="10" fill="#121212" stroke="#3fcf4e"/>
    <text x="103" y="104" fill="#3fcf4e" font-size="13" text-anchor="middle">01 · identify</text>
    <text x="103" y="126" fill="#8a8a8a" font-size="11" text-anchor="middle">diec / DIE</text>
    <!-- 2 -->
    <rect x="208" y="74" width="150" height="80" rx="10" fill="#121212" stroke="#56b6c2"/>
    <text x="283" y="104" fill="#56b6c2" font-size="13" text-anchor="middle">02 · decompile</text>
    <text x="283" y="126" fill="#8a8a8a" font-size="11" text-anchor="middle">dnSpyEx / ILSpy</text>
    <!-- 3 -->
    <rect x="388" y="74" width="150" height="80" rx="10" fill="#121212" stroke="#e2c08d"/>
    <text x="463" y="104" fill="#e2c08d" font-size="13" text-anchor="middle">03 · deobfuscate</text>
    <text x="463" y="126" fill="#8a8a8a" font-size="11" text-anchor="middle">de4dot</text>
    <!-- 4 -->
    <rect x="568" y="74" width="150" height="80" rx="10" fill="#121212" stroke="#e06c6c"/>
    <text x="643" y="104" fill="#e06c6c" font-size="13" text-anchor="middle">04 · unpack</text>
    <text x="643" y="126" fill="#8a8a8a" font-size="11" text-anchor="middle">runtime dump (VM)</text>
    <!-- 5 -->
    <rect x="748" y="74" width="160" height="80" rx="10" fill="#121212" stroke="#3fcf4e"/>
    <text x="828" y="104" fill="#3fcf4e" font-size="13" text-anchor="middle">05 · IOC + detect</text>
    <text x="828" y="126" fill="#8a8a8a" font-size="11" text-anchor="middle">YARA / rules</text>
  </g>

  <!-- arrows -->
  <g stroke="#404040" stroke-width="2" fill="none">
    <path d="M178 114 H208" marker-end="url(#a)"/>
    <path d="M358 114 H388" marker-end="url(#a)"/>
    <path d="M538 114 H568" marker-end="url(#a)"/>
    <path d="M718 114 H748" marker-end="url(#a)"/>
  </g>
  <text x="470" y="194" fill="#5a5a5a" font-size="11" text-anchor="middle">loop until method bodies are readable and IOCs are extracted</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#404040"/>
    </marker>
  </defs>
</svg>
